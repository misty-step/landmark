# Release pipeline using Google's release-please for versioning
# and Landmark for user-facing note synthesis.
#
# How it works:
#   1. release-please analyzes conventional commits and opens a "Release PR"
#   2. When that PR merges, release-please creates the GitHub Release and tag
#   3. Landmark synthesizes user-facing notes and updates the release body
#
# Requirements:
#   - Repository secrets: LANDMARK_RELEASER_APP_ID, LANDMARK_RELEASER_PRIVATE_KEY,
#     OPENROUTER_API_KEY (see landmark's README, "Why a GitHub App, not a PAT")
#   - Conventional commits (https://www.conventionalcommits.org)
#
# Docs:
#   - release-please: https://github.com/googleapis/release-please-action
#   - Landmark: https://github.com/misty-step/landmark

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Change to match your project type:
          # node, python, rust, go, simple, etc.
          release-type: node

  synthesize:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Mint release token
        id: release-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LANDMARK_RELEASER_APP_ID }}
          private-key: ${{ secrets.LANDMARK_RELEASER_PRIVATE_KEY }}

      # Landmark synthesis-only mode: skips semantic-release entirely,
      # only runs LLM synthesis for the tag release-please just created.
      - uses: misty-step/landmark@v0
        with:
          mode: synthesis-only
          release-tag: ${{ needs.release-please.outputs.tag_name }}
          github-token: ${{ steps.release-token.outputs.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional: customize synthesis behavior.
          # audience: developer
          # llm-model: anthropic/claude-sonnet-5
          # llm-fallback-models: "google/gemini-2.5-flash,anthropic/claude-haiku-4.5"
          # changelog-source: release-body
