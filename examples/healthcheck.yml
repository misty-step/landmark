# Weekly Landmark LLM API key validation.
# Catches stale or revoked keys before they cause release failures.
name: LLM Key Health Check

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: misty-step/landmark@v0
        with:
          mode: synthesis-only
          release-tag: v0.0.0
          github-token: ${{ github.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          healthcheck: "true"
          synthesis: "false"
