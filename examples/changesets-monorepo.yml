# Release pipeline using Changesets for a multi-package workspace.
# Each published package gets its own Landmark synthesis-only run.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Mint release token
        id: release-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LANDMARK_RELEASER_APP_ID }}
          private-key: ${{ secrets.LANDMARK_RELEASER_PRIVATE_KEY }}

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  synthesize:
    needs: release
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        package: ${{ fromJson(needs.release.outputs.published_packages) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mint release token
        id: release-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LANDMARK_RELEASER_APP_ID }}
          private-key: ${{ secrets.LANDMARK_RELEASER_PRIVATE_KEY }}

      - uses: misty-step/landmark@v0
        with:
          mode: synthesis-only
          healthcheck: "true"
          release-tag: ${{ matrix.package.name }}@${{ matrix.package.version }}
          github-token: ${{ steps.release-token.outputs.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          changelog-source: release-body
