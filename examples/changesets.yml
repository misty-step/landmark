# Release pipeline using Changesets for versioning
# and Landmark for user-facing note synthesis.
#
# How it works:
#   1. Developers add changeset files via `npx changeset`
#   2. changesets/action opens a "Version Packages" PR collecting pending changesets
#   3. Merging that PR publishes packages and creates GitHub Releases
#   4. Landmark synthesizes user-facing notes for the new release
#
# Requirements:
#   - Repository secrets: LANDMARK_RELEASER_APP_ID, LANDMARK_RELEASER_PRIVATE_KEY,
#     OPENROUTER_API_KEY (see landmark's README, "Why a GitHub App, not a PAT")
#   - Changesets initialized in repo (`npx changeset init`)
#   - publish script that creates GitHub Releases (e.g., `changeset tag`)
#
# Docs:
#   - Changesets: https://github.com/changesets/changesets
#   - changesets/action: https://github.com/changesets/action
#   - Landmark: https://github.com/misty-step/landmark

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Your publish command. Should create GitHub Releases
          # for Landmark to find and enhance.
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  synthesize:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Mint release token
        id: release-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LANDMARK_RELEASER_APP_ID }}
          private-key: ${{ secrets.LANDMARK_RELEASER_PRIVATE_KEY }}

      - uses: misty-step/landmark@v0
        with:
          mode: synthesis-only
          release-tag: v${{ fromJson(needs.release.outputs.published_packages)[0].version }}
          github-token: ${{ steps.release-token.outputs.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional: customize synthesis behavior.
          # audience: developer
          # changelog-source: release-body

# Monorepos should use examples/changesets-monorepo.yml, which runs Landmark
# once per published package with a first-class matrix.
