<!doctype html>
<html lang="en" data-ae-theme="ember">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landmark - Automated release intelligence.</title>
    <meta
      name="description"
      content="Landmark turns conventional commits into release decisions, changelog artifacts, and public release notes backed by repo evidence."
    />
    <script>
      try {
        var m = localStorage.getItem('ae-mode');
        if (m === 'dark' || m === 'light') {
          document.documentElement.classList.add(m);
          document.documentElement.style.colorScheme = m;
        }
      } catch (e) {}
    </script>
    <link rel="stylesheet" href="aesthetic.css" />
    <link rel="stylesheet" href="marketing.css" />
  </head>

    <div class="ae-screen ae-wide msk-hero-screen">
      <div
        class="msk-hero-bg"
        style="background-image: url('assets/hero.jpg')"
        aria-hidden="true"
      ></div>

      <header class="ae-bar msk-bar">
        <a class="ae-logo" href="./" aria-label="Landmark home">
          <span class="ae-app-mark" aria-hidden="true">
            <svg class="ae-icon" data-lucide="signpost">
              <use href="#i-signpost" />
            </svg>
          </span>
          <span class="ae-name">Landmark</span>
        </a>
        <nav class="ae-chrome msk-nav" aria-label="Site">
          <a href="features.html">features</a>
          <span class="msk-sep" aria-hidden="true">&middot;</span>
          <a href="get-started.html">get started</a>
          <span class="msk-sep" aria-hidden="true">&middot;</span>
          <a href="changelog.html">changelog</a>
          <span class="msk-sep" aria-hidden="true">&middot;</span>
          <a href="https://github.com/misty-step/landmark">github</a>
        </nav>
      </header>

      <main class="msk-hero-stage" id="content">
        <div class="msk-hero-blk">
          <h1 class="ae-h msk-tagline">Automated release intelligence.</h1>
          <a class="ae-button" href="get-started.html">Get started</a>
        </div>

        <button class="ae-mode" aria-label="toggle color mode">
          <svg class="ae-icon ae-sun"><use href="#i-sun" /></svg>
          <svg class="ae-icon ae-moon"><use href="#i-moon" /></svg>
        </button>
        <p class="ae-chrome msk-foot-credit">
          a <a href="https://mistystep.io">Misty Step</a> project
          <a
            class="msk-gh-link"
            href="https://github.com/misty-step/landmark"
            aria-label="Landmark on GitHub"
          >
            <svg class="ae-icon" aria-hidden="true"><use href="#i-github" /></svg>
          </a>
        </p>
      </footer>
    </div>

    <script src="mode.js"></script>
    <script src="theme.js"></script>
