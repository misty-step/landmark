name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Prepare release pull request
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -p landmark -- prepare-self-release \
            --repo-root . \
            --repository "${GITHUB_REPOSITORY}" \
            --release-branch landmark/self-release \
            --github-output "${GITHUB_OUTPUT}"

      # An org-owned GitHub App token instead of a user PAT: PRs it creates
      # still trigger pull_request workflows (required merge-gate), and it
      # carries no personal-account expiry. See Powder landmark-016/017.
      - name: Mint release-bot token
        if: steps.prepare.outputs.released == 'true'
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Open or update release pull request
        if: steps.prepare.outputs.released == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.bot-token.outputs.token }}
          branch: ${{ steps.prepare.outputs.release_branch }}
          delete-branch: true
          title: ${{ steps.prepare.outputs.pull_request_title }}
          commit-message: ${{ steps.prepare.outputs.commit_message }}
          body: |
            Automated Landmark self-release PR.

            - Release tag: `${{ steps.prepare.outputs.release_tag }}`
            - Generated files: `CHANGELOG.md`, `package.json`, `crates/landmark/Cargo.toml`, `Cargo.lock`
            - Required pre-merge checks: `merge-gate`, `trufflehog`
            - Per-target release binaries and checksums are built and attached to the
              GitHub Release after this PR lands; they are not part of this diff.

            The GitHub Release is published only after this PR lands on protected `master`.

  publish-landed-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.publish.outputs.published }}
      release_tag: ${{ steps.publish.outputs.release_tag }}
    steps:
      - name: Mint release-bot token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout landed release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Publish landed release metadata
        id: publish
        shell: bash
        env:
          RELEASE_BOT_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          set -euo pipefail
          cargo run --locked -p landmark -- publish-self-release \
            --repo-root . \
            --github-token "${RELEASE_BOT_TOKEN}" \
            --repository "${GITHUB_REPOSITORY}" \
            --target-sha "${GITHUB_SHA}" \
            --github-output "${GITHUB_OUTPUT}"

  publish-crate:
    needs: publish-landed-release
    if: needs.publish-landed-release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout landed release
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Publish to crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish." >&2
            exit 0
          fi
          cargo publish --locked -p landmark

  build-release-assets:
    needs: publish-landed-release
    if: needs.publish-landed-release.outputs.published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout landed release
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assets
          cp "target/${{ matrix.target }}/release/landmark" "assets/landmark-${{ matrix.target }}"
          chmod +x "assets/landmark-${{ matrix.target }}"

      - name: Upload asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: landmark-${{ matrix.target }}
          path: assets/landmark-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 1

  publish-release-assets:
    needs: [publish-landed-release, build-release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint release-bot token
        id: bot-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout landed release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: landmark-*
          path: assets
          merge-multiple: true

      - name: Checksum release assets
        shell: bash
        working-directory: assets
        run: sha256sum landmark-* > checksums.txt

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.publish-landed-release.outputs.release_tag }}" \
            assets/landmark-* assets/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Synthesize landed release notes
        uses: ./
        env:
          RELEASE_FEED_URL: ${{ secrets.RELEASE_FEED_URL }}
          RELEASE_FEED_SECRET: ${{ secrets.RELEASE_FEED_SECRET }}
        with:
          mode: synthesis-only
          release-tag: ${{ needs.publish-landed-release.outputs.release_tag }}
          github-token: ${{ steps.bot-token.outputs.token }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          synthesis-required: "false"
          floating-tags: "true"
          changelog-source: release-body
          webhook-url: ${{ secrets.LANDMARK_WEBHOOK_URL }}
          webhook-secret: ${{ secrets.LANDMARK_WEBHOOK_SECRET }}
