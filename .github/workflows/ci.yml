name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  local-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify Node 24 runtime
        shell: bash
        run: node --version | grep '^v24\.'

      - name: Run local gate
        shell: bash
        env:
          LANDMARK_CI_EVENT: ${{ github.event_name }}
          LANDMARK_PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          LANDMARK_PR_HEAD_REF: ${{ github.head_ref || '' }}
          LANDMARK_PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          LANDMARK_REPOSITORY: ${{ github.repository }}
        run: bin/gate

      - name: Upload Linux action binary evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landmark-linux-action-binary
          path: target/x86_64-unknown-linux-musl/release/landmark
          if-no-files-found: ignore

      - name: Upload replay evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landmark-replay-evidence
          path: .landmark/replay/
          if-no-files-found: ignore

  merge-gate:
    runs-on: ubuntu-latest
    needs: [local-gate]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
