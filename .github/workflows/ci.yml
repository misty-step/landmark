name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lockfile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify lockfile is in sync
        shell: bash
        run: npm ci --no-fund --no-audit

  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets
        shell: bash
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install tooling
        shell: bash
        run: npm ci --no-fund --no-audit

      - name: Format Rust
        shell: bash
        run: cargo fmt --check

      - name: Lint Rust
        shell: bash
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Verify metadata versions match latest release tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          tag_ref="HEAD"
          if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ]; then
            tag_ref="${PR_BASE_SHA}"
          fi
          cargo run --locked -- check-version-sync --reference "${tag_ref}"

      - name: Verify public action contract
        shell: bash
        run: cargo run --locked -- check-action-contract

      - name: Verify adoption setup analyzer
        shell: bash
        run: cargo run --locked -- setup --repo-root . --output-dir .landfall/setup

      - name: Run tests
        shell: bash
        run: cargo test --locked

      - name: Verify checked-in Linux action binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target x86_64-unknown-linux-musl
          test -x dist/landfall
          shasum -a 256 -c dist/landfall.sha256
          dist/landfall --help >/dev/null

      - name: Replay Landfall action behavior
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            dist/landfall replay-action \
              --evidence-dir .landfall/replay \
              --scenario action_static_contract \
              --scenario consumer_full_mode_success \
              --scenario consumer_synthesis_only_success \
              --scenario consumer_degraded_required_fails \
              --scenario consumer_release_update_failure \
              --scenario consumer_floating_tag_behavior
          else
            dist/landfall replay-action --evidence-dir .landfall/replay
          fi

      - name: Upload replay evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: landfall-replay-evidence
          path: .landfall/replay/
          if-no-files-found: ignore

      - name: Validate action metadata
        shell: bash
        run: cargo run --locked -- check-action-contract

  merge-gate:
    runs-on: ubuntu-latest
    needs: [lockfile-check, rust-checks]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
