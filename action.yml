name: Landmark
description: Focused release pipeline using semantic-release with optional LLM-powered synthesis.

inputs:
  mode:
    description: "Pipeline mode: 'full' (semantic-release + synthesis), 'synthesis-only' (synthesize for existing tag)."
    default: "full"
    required: false
  release-tag:
    description: Release tag to synthesize notes for (required when mode is synthesis-only).
    default: ""
    required: false
  github-token:
    description: Personal access token with repository write access.
    required: true
  llm-api-key:
    description: API key for LLM synthesis (OpenRouter, OpenAI, or any compatible provider).
    required: false
  llm-model:
    description: Primary model ID for synthesis (e.g., 'anthropic/claude-sonnet-5', 'anthropic/claude-haiku-4.5').
    default: ""
    required: false
  llm-fallback-models:
    description: Comma-separated fallback model IDs tried in order if primary fails.
    default: ""
    required: false
  llm-api-url:
    description: Chat completions endpoint URL (OpenAI-compatible).
    default: "https://openrouter.ai/api/v1/chat/completions"
    required: false
  node-version:
    description: Node.js version for semantic-release.
    default: "24"
    required: false
  synthesis:
    description: Whether to synthesize user-facing release notes.
    default: "true"
    required: false
  synthesis-required:
    description: Whether synthesis failures should fail the action. When true, a failed LLM key validation (healthcheck) also blocks the run before the release is published.
    default: "false"
    required: false
  synthesis-strict:
    description: Deprecated alias for synthesis-required.
    default: "false"
    required: false
  synthesis-failure-issue:
    description: Whether to create a GitHub issue in the consuming repository when synthesis fails.
    default: "false"
    required: false
  notes-output-file:
    description: Write synthesized notes to this file path. Use {version} placeholder for the release tag (e.g., 'docs/releases/{version}.md').
    default: ""
    required: false
  notes-output-text-file:
    description: Write synthesized notes as plaintext to this file path. Use {version} placeholder (e.g., 'docs/releases/{version}.txt').
    default: ""
    required: false
  notes-output-html-file:
    description: Write synthesized notes as an HTML fragment to this file path. Use {version} placeholder (e.g., 'docs/releases/{version}.html').
    default: ""
    required: false
  notes-output-json:
    description: Append a structured release entry to this JSON array file. Creates the file if it does not exist.
    default: ""
    required: false
  prompt-template-path:
    description: Path to a custom synthesis prompt template (relative to repo root). Overrides audience and convention-based detection (.landmark/synthesis-prompt.md).
    default: ""
    required: false
  audience:
    description: Built-in synthesis prompt variant used when no custom prompt template is found. One of general, developer, end-user, enterprise.
    default: ""
    required: false
  product-description:
    description: One-line product description injected into the synthesis prompt as {{PRODUCT_CONTEXT}}.
    default: ""
    required: false
  voice-guide:
    description: Tone/style guidance injected into the synthesis prompt as {{VOICE_GUIDE}}.
    default: ""
    required: false
  changelog-source:
    description: Technical source for synthesis. One of auto (CHANGELOG.md > release body > PRs), changelog, release-body, prs.
    default: ""
    required: false
  healthcheck:
    description: Validate LLM API key with a minimal probe request before synthesis. Catches stale or revoked keys early.
    default: "false"
    required: false
  floating-tags:
    description: Update floating major version tags (e.g., v1) after release. Recommended for GitHub Actions repos.
    default: "false"
    required: false
  webhook-url:
    description: Webhook endpoint URL. On synthesis success, POST a JSON payload with version, notes (markdown/HTML/plaintext), and release URL.
    default: ""
    required: false
  webhook-secret:
    description: HMAC-SHA256 secret for signing webhook payloads (X-Signature-256 header). Optional.
    default: ""
    required: false
  slack-webhook-url:
    description: Slack Incoming Webhook URL. On synthesis success, POST a Block Kit message with version, categorized notes, and release link.
    default: ""
    required: false
  rss-feed-file:
    description: Path to an RSS 2.0 feed file to update on release (e.g., 'docs/releases.xml'). The file is committed back to the repo.
    default: ""
    required: false
  rss-max-entries:
    description: Maximum number of RSS entries to retain in the feed file.
    default: "50"
    required: false

outputs:
  released:
    description: Whether a release was created (full mode) or targeted (synthesis-only mode).
    value: ${{ steps.resolve_release.outputs.released }}
  release-tag:
    description: Release tag (created by semantic-release in full mode, or from input in synthesis-only mode).
    value: ${{ steps.resolve_release.outputs.release_tag }}
  synthesis-succeeded:
    description: Whether synthesis and release body update completed successfully.
    value: ${{ steps.synthesis_result.outputs.succeeded }}
  release-notes:
    description: Synthesized user-facing release notes markdown. Empty if synthesis was skipped or failed.
    value: ${{ steps.write_artifacts.outputs.notes }}
  synthesis-quality:
    description: "Quality of synthesized output: valid (passed validation), degraded (validation failed, using unvalidated output), skipped (policy skip), or failed."
    value: ${{ steps.synthesis_result.outputs.quality }}
  synthesis-status:
    description: Machine-readable JSON status for synthesis, model attempts, context sources, cost metadata, classification, and publication destinations.
    value: ${{ steps.synthesis_result.outputs.status_json }}
  webhook-sent:
    description: Whether the webhook notification was sent successfully.
    value: ${{ steps.notify_webhook.outputs.sent || 'false' }}
  slack-sent:
    description: Whether the Slack notification was sent successfully.
    value: ${{ steps.notify_slack.outputs.sent || 'false' }}
  synthesis-failure-issue-action:
    description: "Companion issue lifecycle result: closed, reported, failed, or skipped."
    value: ${{ steps.close_failure_issues.outputs.action || steps.report_synthesis_failure.outputs.action || 'skipped' }}

runs:
  using: composite
  steps:
    - name: Bootstrap Landmark binary
      id: bootstrap
      shell: bash
      run: |
        set -euo pipefail

        version="$(grep -m1 '"version"' "${GITHUB_ACTION_PATH}/package.json" | sed -E 's/.*"version": *"([^"]+)".*/\1/')"
        if [ -z "${version}" ]; then
          echo "::error::Landmark bootstrap could not read version from package.json"
          exit 1
        fi

        os="$(uname -s)"
        arch="$(uname -m)"
        case "${os}-${arch}" in
          Linux-x86_64) target="x86_64-unknown-linux-musl" ;;
          Linux-aarch64|Linux-arm64) target="aarch64-unknown-linux-musl" ;;
          Darwin-arm64) target="aarch64-apple-darwin" ;;
          Darwin-x86_64) target="x86_64-apple-darwin" ;;
          *)
            echo "::error::Landmark has no published release binary for ${os}-${arch}"
            exit 1
            ;;
        esac

        release_tag="v${version}"
        asset_name="landmark-${target}"
        base_url="https://github.com/misty-step/landmark/releases/download/${release_tag}"
        bin_dir="${RUNNER_TEMP}/landmark-bin"
        mkdir -p "${bin_dir}"
        bin_path="${bin_dir}/landmark"
        checksums_path="${bin_dir}/checksums.txt"

        download() {
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused \
            --location --silent --show-error --fail "$1" -o "$2"
        }

        download "${base_url}/checksums.txt" "${checksums_path}"
        download "${base_url}/${asset_name}" "${bin_path}"

        expected="$(grep -F " ${asset_name}" "${checksums_path}" | awk '{print $1}' || true)"
        if [ -z "${expected}" ]; then
          echo "::error::checksums.txt for ${release_tag} has no entry for ${asset_name}"
          exit 1
        fi
        actual="$(shasum -a 256 "${bin_path}" | awk '{print $1}')"
        if [ "${expected}" != "${actual}" ]; then
          echo "::error::Landmark binary checksum mismatch for ${asset_name} (expected ${expected}, got ${actual})"
          exit 1
        fi
        chmod +x "${bin_path}"
        echo "LANDMARK_BIN=${bin_path}" >> "${GITHUB_ENV}"

    - name: Setup Node.js
      if: inputs.mode != 'synthesis-only'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Node dependencies
      if: inputs.mode != 'synthesis-only'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci --no-fund --no-audit

    - name: Resolve manifest defaults
      id: manifest_defaults
      shell: bash
      run: |
        set -euo pipefail
        "${LANDMARK_BIN}" manifest-defaults \
          --repo-root "${GITHUB_WORKSPACE}" \
          --github-output "${GITHUB_OUTPUT}"

    - name: Validate LLM API key
      if: (inputs.synthesis == 'true' || inputs.healthcheck == 'true') && inputs.llm-api-key != ''
      shell: bash
      env:
        LLM_API_KEY: ${{ inputs.llm-api-key }}
        LLM_MODEL: ${{ inputs.llm-model || steps.manifest_defaults.outputs.llm_model || 'anthropic/claude-sonnet-5' }}
        MODEL_POLICY: ${{ steps.manifest_defaults.outputs.model_policy }}
        LLM_API_URL: ${{ inputs.llm-api-url }}
        SYNTHESIS_REQUIRED: ${{ inputs.synthesis-required }}
      run: |
        set -euo pipefail
        if [ "$(printf '%s' "${MODEL_POLICY}" | tr '[:upper:]' '[:lower:]')" = "off" ] || [ "$(printf '%s' "${LLM_MODEL}" | tr '[:upper:]' '[:lower:]')" = "off" ]; then
          echo "::notice::Landmark LLM healthcheck skipped because model.policy=off disables synthesis."
          exit 0
        fi
        WARN_ONLY_ARGS=()
        if [ "${SYNTHESIS_REQUIRED}" != "true" ]; then
          WARN_ONLY_ARGS=(--warn-only)
        fi
        "${LANDMARK_BIN}" healthcheck \
          --api-key "${LLM_API_KEY}" \
          --model "${LLM_MODEL}" \
          --api-url "${LLM_API_URL}" \
          "${WARN_ONLY_ARGS[@]}"

    - name: Preflight tag history check
      if: inputs.mode != 'synthesis-only'
      shell: bash
      run: |
        set -euo pipefail
        git fetch --tags --force 2>/dev/null || true
        "${LANDMARK_BIN}" preflight-tags

    - name: Run semantic-release
      id: semantic_release
      if: inputs.mode != 'synthesis-only'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        # Detect consumer-provided semantic-release config
        sr_extends_arg="--extends ${GITHUB_ACTION_PATH}/configs/.releaserc.json"
        for config_file in .releaserc .releaserc.json .releaserc.yml .releaserc.yaml \
                           release.config.js release.config.cjs release.config.mjs; do
          if [ -f "${GITHUB_WORKSPACE}/${config_file}" ]; then
            echo "::notice::Using repo semantic-release config: ${config_file}"
            sr_extends_arg=""
            break
          fi
        done

        before_tags="$(mktemp)"
        after_tags="$(mktemp)"
        git tag | sort > "${before_tags}"

        # shellcheck disable=SC2086
        npx --yes --prefix "${GITHUB_ACTION_PATH}" semantic-release \
          ${sr_extends_arg}

        git tag | sort > "${after_tags}"
        new_tag="$(comm -13 "${before_tags}" "${after_tags}" | tail -n1 || true)"

        if [ -n "${new_tag}" ]; then
          echo "released=true" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${new_tag}" >> "${GITHUB_OUTPUT}"
        else
          echo "released=false" >> "${GITHUB_OUTPUT}"
          echo "release_tag=" >> "${GITHUB_OUTPUT}"
        fi

    - name: Resolve release context
      id: resolve_release
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        INPUT_RELEASE_TAG: ${{ inputs.release-tag }}
        SR_RELEASED: ${{ steps.semantic_release.outputs.released }}
        SR_RELEASE_TAG: ${{ steps.semantic_release.outputs.release_tag }}
      run: |
        set -euo pipefail
        if [ "${MODE}" = "synthesis-only" ]; then
          if [ -z "${INPUT_RELEASE_TAG}" ]; then
            echo "::error::release-tag input is required when mode is synthesis-only"
            exit 1
          fi
          echo "released=true" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${INPUT_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
        else
          echo "released=${SR_RELEASED}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${SR_RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Synthesize user-facing notes
      id: synthesize
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        LLM_API_KEY: ${{ inputs.llm-api-key }}
        LLM_MODEL: ${{ inputs.llm-model || steps.manifest_defaults.outputs.llm_model }}
        LLM_API_URL: ${{ inputs.llm-api-url }}
        LLM_FALLBACK_MODELS: ${{ inputs.llm-fallback-models || steps.manifest_defaults.outputs.llm_fallback_models || 'google/gemini-2.5-flash,anthropic/claude-haiku-4.5' }}
        MODEL_POLICY: ${{ steps.manifest_defaults.outputs.model_policy }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        PROMPT_TEMPLATE_PATH: ${{ inputs.prompt-template-path }}
        PRODUCT_NAME: ${{ steps.manifest_defaults.outputs.product_name }}
        AUDIENCE: ${{ inputs.audience || steps.manifest_defaults.outputs.audience }}
        CHANGELOG_SOURCE: ${{ inputs.changelog-source || steps.manifest_defaults.outputs.changelog_source }}
        PRODUCT_DESCRIPTION: ${{ inputs.product-description || steps.manifest_defaults.outputs.product_description }}
        VOICE_GUIDE: ${{ inputs.voice-guide || steps.manifest_defaults.outputs.voice_guide }}
      run: |
        set -euo pipefail

        sanitize_text() {
          printf '%s' "$1" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g'
        }

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        notes_file="${RUNNER_TEMP}/landmark-whats-new.md"
        product_name="${PRODUCT_NAME}"
        if [ -z "${product_name}" ]; then
          product_name="${GITHUB_REPOSITORY#*/}"
        fi
        api_key="${LLM_API_KEY}"
        product_description="${PRODUCT_DESCRIPTION}"
        voice_guide="${VOICE_GUIDE}"

        set_output "succeeded" "false"
        set_output "notes_file" ""
        set_output "failure_stage" ""
        set_output "failure_message" ""

        changelog_source="$(printf '%s' "${CHANGELOG_SOURCE:-auto}" | tr '[:upper:]' '[:lower:]')"
        audience="${AUDIENCE:-general}"
        case "${changelog_source}" in
          auto|changelog|release-body|prs) ;;
          *)
            message="Invalid changelog-source '${CHANGELOG_SOURCE}'. Expected one of: auto, changelog, release-body, prs."
            echo "::warning::${message}"
            set_output "failure_stage" "configuration"
            set_output "failure_message" "$(sanitize_text "${message}")"
            exit 0
            ;;
        esac

        release_tag="${RELEASE_TAG}"
        changelog_file="${GITHUB_WORKSPACE}/CHANGELOG.md"
        release_body_file=""
        pr_changelog_file=""

        fetch_release_body() {
          local target_file="$1"
          local fetch_log="${RUNNER_TEMP}/landmark-fetch-release-body.log"
          if ! "${LANDMARK_BIN}" fetch-release-body \
            --github-token "${GITHUB_TOKEN}" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-tag "${release_tag}" \
            --output-file "${target_file}" \
            > /dev/null \
            2> "${fetch_log}"; then
            cat "${fetch_log}" >&2
            return 1
          fi
          [ -s "${target_file}" ]
        }

        build_pr_changelog() {
          local target_file="$1"
          "${LANDMARK_BIN}" extract-prs \
            --github-token "${GITHUB_TOKEN}" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-tag "${release_tag}" \
            --output-file "${target_file}" \
            --repo-root "${GITHUB_WORKSPACE}" \
            > /dev/null \
            2> "${RUNNER_TEMP}/landmark-extract-prs.log"
        }

        has_changelog_file="false"
        if [ -s "${changelog_file}" ]; then
          has_changelog_file="true"
        fi

        if [ "${changelog_source}" = "release-body" ] || [ "${changelog_source}" = "auto" ]; then
          if [ "${changelog_source}" = "release-body" ] || [ "${has_changelog_file}" != "true" ]; then
            candidate_release_body="${RUNNER_TEMP}/landmark-release-body.md"
            if fetch_release_body "${candidate_release_body}"; then
              release_body_file="${candidate_release_body}"
            fi
          fi
        fi

        if [ "${changelog_source}" = "prs" ] || [ "${changelog_source}" = "auto" ]; then
          should_extract_prs="false"
          if [ "${changelog_source}" = "prs" ]; then
            should_extract_prs="true"
          elif [ "${has_changelog_file}" != "true" ] && [ -z "${release_body_file}" ]; then
            should_extract_prs="true"
          fi

          if [ "${should_extract_prs}" = "true" ]; then
            candidate_pr_changelog="${RUNNER_TEMP}/landmark-pr-changelog.md"
            if build_pr_changelog "${candidate_pr_changelog}" && [ -s "${candidate_pr_changelog}" ]; then
              pr_changelog_file="${candidate_pr_changelog}"
            fi
          fi
        fi

        if [ "${changelog_source}" = "changelog" ] && [ "${has_changelog_file}" != "true" ]; then
          message="changelog-source is 'changelog' but CHANGELOG.md is missing or empty."
          echo "::warning::${message}"
          set_output "failure_stage" "configuration"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        if [ "${changelog_source}" = "release-body" ] && [ -z "${release_body_file}" ]; then
          message="changelog-source is 'release-body' but no release body was found for ${release_tag}."
          echo "::warning::${message}"
          set_output "failure_stage" "configuration"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        if [ "${changelog_source}" = "prs" ] && [ -z "${pr_changelog_file}" ]; then
          message="changelog-source is 'prs' but PR extraction returned no changelog content."
          echo "::warning::${message}"
          set_output "failure_stage" "configuration"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        # Resolve prompt template: explicit input > convention > bundled audience variant
        prompt_template=""
        if [ -n "${PROMPT_TEMPLATE_PATH}" ]; then
          custom_path="${GITHUB_WORKSPACE}/${PROMPT_TEMPLATE_PATH}"
          if [ ! -f "${custom_path}" ]; then
            echo "::error::Custom prompt template not found: ${PROMPT_TEMPLATE_PATH}"
            exit 1
          fi
          prompt_template="${custom_path}"
          echo "::notice::Using custom prompt template: ${PROMPT_TEMPLATE_PATH}"
        elif [ -f "${GITHUB_WORKSPACE}/.landmark/synthesis-prompt.md" ]; then
          prompt_template="${GITHUB_WORKSPACE}/.landmark/synthesis-prompt.md"
          echo "::notice::Using repo prompt template: .landmark/synthesis-prompt.md"
        else
          echo "::notice::Using built-in prompt template audience: ${audience}"
        fi

        quality_file="${RUNNER_TEMP}/landmark-synthesis-quality.txt"
        attempts_file="${RUNNER_TEMP}/landmark-synthesis-attempts.json"
        context_metadata_file="${RUNNER_TEMP}/landmark-synthesis-context.json"
        claim_map_file="${RUNNER_TEMP}/landmark-synthesis-claim-map.json"
        synth_log="${RUNNER_TEMP}/landmark-synthesize.log"
        set_output "attempts_file" "${attempts_file}"
        set_output "context_metadata_file" "${context_metadata_file}"
        set_output "claim_map_file" "${claim_map_file}"
        synth_source_args=()
        if [ -n "${release_body_file}" ]; then
          synth_source_args+=(--release-body-file "${release_body_file}")
        fi
        if [ -n "${pr_changelog_file}" ]; then
          synth_source_args+=(--pr-changelog-file "${pr_changelog_file}")
        fi
        if [ -n "${prompt_template}" ]; then
          synth_source_args+=(--prompt-template "${prompt_template}")
        fi
        if ! "${LANDMARK_BIN}" synthesize \
          --api-key "${api_key}" \
          --model "${LLM_MODEL}" \
          --model-policy "${MODEL_POLICY}" \
          --api-url "${LLM_API_URL}" \
          --fallback-models "${LLM_FALLBACK_MODELS}" \
          --product-name "${product_name}" \
          --product-description "${product_description}" \
          --voice-guide "${voice_guide}" \
          --audience "${audience}" \
          --changelog-source "${changelog_source}" \
          --version "${release_tag}" \
          --changelog-file "${changelog_file}" \
          --repo-root "${GITHUB_WORKSPACE}" \
          "${synth_source_args[@]}" \
          --templates-dir "${GITHUB_ACTION_PATH}/templates/prompts" \
          --quality-file "${quality_file}" \
          --attempts-file "${attempts_file}" \
          --context-metadata-file "${context_metadata_file}" \
          --claim-map-file "${claim_map_file}" \
          > "${notes_file}" \
          2> "${synth_log}"; then
          details="$(tail -n 5 "${synth_log}" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
          quality=""
          if [ -f "${quality_file}" ]; then
            quality="$(cat "${quality_file}")"
          fi
          if [ "${quality}" = "ungrounded" ]; then
            message="Landmark synthesis fabricated release-note sections with no grounded source evidence; refusing to publish rather than ship fiction."
          else
            message="Landmark synthesis failed; publishing release without a What's New section."
          fi
          if [ -n "${details}" ]; then
            message="${message} Details: ${details}"
          fi
          message="$(sanitize_text "${message}")"
          echo "::warning::${message}"
          set_output "quality" "${quality}"
          set_output "failure_stage" "synthesis"
          set_output "failure_message" "${message}"
          exit 0
        fi

        if [ -f "${quality_file}" ] && [ "$(cat "${quality_file}")" = "skipped" ]; then
          message="Landmark synthesis skipped by cost/significance policy."
          echo "::notice::${message}"
          set_output "quality" "skipped"
          set_output "failure_stage" "skipped"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        if [ ! -s "${notes_file}" ]; then
          message="Landmark synthesis returned empty notes; skipping release update."
          echo "::warning::${message}"
          set_output "failure_stage" "synthesis_empty"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        quality="valid"
        if [ -f "${quality_file}" ]; then
          quality="$(cat "${quality_file}")"
        fi
        set_output "succeeded" "true"
        set_output "notes_file" "${notes_file}"
        set_output "quality" "${quality}"

    - name: Evaluate synthesis publication policy
      id: synthesis_publish_policy
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true'
      shell: bash
      env:
        SYNTHESIS_REQUIRED: ${{ inputs.synthesis-required }}
        SYNTHESIS_STRICT: ${{ inputs.synthesis-strict }}
        SYNTH_STEP_SUCCEEDED: ${{ steps.synthesize.outputs.succeeded }}
        SYNTH_QUALITY: ${{ steps.synthesize.outputs.quality }}
        SYNTH_FAILURE_STAGE: ${{ steps.synthesize.outputs.failure_stage }}
        SYNTH_FAILURE_MESSAGE: ${{ steps.synthesize.outputs.failure_message }}
      run: |
        set -euo pipefail
        "${LANDMARK_BIN}" release-policy publication \
          --synthesis-required "${SYNTHESIS_REQUIRED}" \
          --synthesis-strict "${SYNTHESIS_STRICT}" \
          --synth-succeeded "${SYNTH_STEP_SUCCEEDED}" \
          --synth-quality "${SYNTH_QUALITY}" \
          --synth-failure-stage "${SYNTH_FAILURE_STAGE}" \
          --synth-failure-message "${SYNTH_FAILURE_MESSAGE}" \
          --github-output "${GITHUB_OUTPUT}"

    - name: Update release body
      id: update_release
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true' && steps.synthesis_publish_policy.outputs.can_update_release == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SYNTH_STEP_SUCCEEDED: ${{ steps.synthesis_publish_policy.outputs.succeeded }}
        SYNTH_FAILURE_STAGE: ${{ steps.synthesis_publish_policy.outputs.failure_stage }}
        SYNTH_FAILURE_MESSAGE: ${{ steps.synthesis_publish_policy.outputs.failure_message }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        NOTES_FILE: ${{ steps.synthesize.outputs.notes_file }}
      run: |
        set -euo pipefail

        sanitize_text() {
          printf '%s' "$1" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g'
        }

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        set_output "succeeded" "false"
        set_output "failure_stage" ""
        set_output "failure_message" ""

        if [ "${SYNTH_STEP_SUCCEEDED}" != "true" ]; then
          stage="${SYNTH_FAILURE_STAGE}"
          message="${SYNTH_FAILURE_MESSAGE}"
          if [ -z "${stage}" ]; then
            stage="synthesis"
          fi
          if [ -z "${message}" ]; then
            message="Release body update skipped because synthesis did not succeed."
          fi
          set_output "failure_stage" "$(sanitize_text "${stage}")"
          set_output "failure_message" "$(sanitize_text "${message}")"
          exit 0
        fi

        update_log="${RUNNER_TEMP}/landmark-update-release.log"
        if ! "${LANDMARK_BIN}" run \
          --provider github \
          --repo-root "${GITHUB_WORKSPACE}" \
          --repository "${GITHUB_REPOSITORY}" \
          --release-tag "${RELEASE_TAG}" \
          --server-url "${GITHUB_SERVER_URL}" \
          --github-token "${GITHUB_TOKEN}" \
          --notes-file "${NOTES_FILE}" \
          --publish-release-body \
          --output-dir "${RUNNER_TEMP}/landmark-run" \
          --technical-changelog-file "${RUNNER_TEMP}/landmark-technical-changelog.md" \
          --evidence-file "${RUNNER_TEMP}/landmark-run-evidence.json" \
          --output-file "" \
          --output-text-file "" \
          --output-html-file "" \
          --output-json "" \
          --rss-feed-file "" \
          > /dev/null \
          2> "${update_log}"; then
          details="$(tail -n 5 "${update_log}" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
          message="Landmark could not update the release body; release remains published."
          if [ -n "${details}" ]; then
            message="${message} Details: ${details}"
          fi
          message="$(sanitize_text "${message}")"
          echo "::warning::${message}"
          set_output "failure_stage" "release_update"
          set_output "failure_message" "${message}"
          exit 0
        fi

        set_output "succeeded" "true"

    - name: Write release notes artifacts
      id: write_artifacts
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true' && steps.synthesis_publish_policy.outputs.succeeded == 'true' && steps.update_release.outputs.succeeded == 'true'
      shell: bash
      env:
        NOTES_FILE: ${{ steps.synthesize.outputs.notes_file }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        OUTPUT_FILE: ${{ inputs.notes-output-file || steps.manifest_defaults.outputs.notes_output_file }}
        OUTPUT_TEXT_FILE: ${{ inputs.notes-output-text-file || steps.manifest_defaults.outputs.notes_output_text_file }}
        OUTPUT_HTML_FILE: ${{ inputs.notes-output-html-file || steps.manifest_defaults.outputs.notes_output_html_file }}
        OUTPUT_JSON: ${{ inputs.notes-output-json || steps.manifest_defaults.outputs.notes_output_json }}
      run: |
        set -euo pipefail

        sanitize_text() {
          printf '%s' "$1" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g'
        }

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        notes=""
        set_output "succeeded" "false"
        set_output "failure_stage" ""
        set_output "failure_message" ""

        if [ -f "${NOTES_FILE}" ]; then
          artifacts_log="${RUNNER_TEMP}/landmark-write-artifacts.log"
          if "${LANDMARK_BIN}" run \
            --provider github \
            --repo-root "${GITHUB_WORKSPACE}" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-tag "${RELEASE_TAG}" \
            --server-url "${GITHUB_SERVER_URL}" \
            --notes-file "${NOTES_FILE}" \
            --output-dir "${RUNNER_TEMP}/landmark-run" \
            --technical-changelog-file "${RUNNER_TEMP}/landmark-artifacts-technical-changelog.md" \
            --evidence-file "${RUNNER_TEMP}/landmark-artifacts-evidence.json" \
            --output-file "${OUTPUT_FILE}" \
            --output-text-file "${OUTPUT_TEXT_FILE}" \
            --output-html-file "${OUTPUT_HTML_FILE}" \
            --output-json "${OUTPUT_JSON}" \
            --rss-feed-file "" \
            > "${RUNNER_TEMP}/landmark-artifacts-evidence.stdout" \
            2> "${artifacts_log}"; then
            notes="$(cat "${NOTES_FILE}")"
            set_output "succeeded" "true"
          else
            details="$(tail -n 5 "${artifacts_log}" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
            message="Landmark could not write release notes artifacts."
            if [ -n "${details}" ]; then
              message="${message} Details: ${details}"
            fi
            message="$(sanitize_text "${message}")"
            echo "::warning::${message}"
            set_output "failure_stage" "artifact_write"
            set_output "failure_message" "${message}"
          fi
        else
          message="Landmark could not write release notes artifacts; notes file is missing."
          echo "::warning::${message}"
          set_output "failure_stage" "artifact_write"
          set_output "failure_message" "$(sanitize_text "${message}")"
        fi

        delimiter="landmark-notes-eof-$(date +%s%N)-${RANDOM}"
        while printf '%s\n' "${notes}" | grep -Fxq "${delimiter}"; do
          delimiter="landmark-notes-eof-$(date +%s%N)-${RANDOM}"
        done
        {
          echo "notes<<${delimiter}"
          printf '%s\n' "${notes}"
          echo "${delimiter}"
        } >> "${GITHUB_OUTPUT}"

    - name: Update RSS feed file
      id: update_rss
      if: (inputs.rss-feed-file != '' || steps.manifest_defaults.outputs.rss_feed_file != '') && steps.resolve_release.outputs.released == 'true' && steps.write_artifacts.outputs.succeeded == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RSS_FEED_FILE: ${{ inputs.rss-feed-file || steps.manifest_defaults.outputs.rss_feed_file }}
        RSS_MAX_ENTRIES: ${{ inputs.rss-max-entries }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        NOTES_FILE: ${{ steps.synthesize.outputs.notes_file }}
      run: |
        set -euo pipefail

        sanitize_text() {
          printf '%s' "$1" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g'
        }

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        set_output "succeeded" "false"
        set_output "failure_stage" ""
        set_output "failure_message" ""

        retry_command() {
          local log_file="$1"
          shift
          local attempt=1
          while [ "${attempt}" -le 3 ]; do
            if timeout 120s "$@" >> "${log_file}" 2>&1; then
              return 0
            fi
            attempt=$((attempt + 1))
            sleep "$((attempt * 2))"
          done
          return 1
        }

        rss_log="${RUNNER_TEMP}/landmark-update-rss.log"

        if {
          "${LANDMARK_BIN}" run \
            --provider github \
            --repo-root "${GITHUB_WORKSPACE}" \
            --repository "${GITHUB_REPOSITORY}" \
            --release-tag "${RELEASE_TAG}" \
            --server-url "${GITHUB_SERVER_URL}" \
            --notes-file "${NOTES_FILE}" \
            --output-dir "${RUNNER_TEMP}/landmark-run" \
            --technical-changelog-file "${RUNNER_TEMP}/landmark-rss-technical-changelog.md" \
            --evidence-file "${RUNNER_TEMP}/landmark-rss-evidence.json" \
            --output-file "" \
            --output-text-file "" \
            --output-html-file "" \
            --output-json "" \
            --rss-feed-file "${RSS_FEED_FILE}" \
            --rss-max-entries "${RSS_MAX_ENTRIES}" &&
          git config user.name "github-actions[bot]" &&
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com" &&
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" &&
          git add "${RSS_FEED_FILE}"
        } > /dev/null 2> "${rss_log}"; then
          if git diff --cached --quiet; then
            echo "::notice::RSS feed unchanged; skipping commit."
            set_output "succeeded" "true"
            exit 0
          fi

          if git commit -m "chore(feed): update releases feed for ${RELEASE_TAG} [skip ci]" \
            >> "${rss_log}" 2>&1 && \
            retry_command "${rss_log}" git push origin "HEAD:${GITHUB_REF_NAME}"; then
            set_output "succeeded" "true"
            exit 0
          fi
        fi

        details="$(tail -n 5 "${rss_log}" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g' | sed -E 's/^ +| +$//g')"
        message="Landmark could not update the RSS release feed."
        if [ -n "${details}" ]; then
          message="${message} Details: ${details}"
        fi
        message="$(sanitize_text "${message}")"
        echo "::warning::${message}"
        set_output "failure_stage" "rss_update"
        set_output "failure_message" "${message}"

    - name: Send webhook notification
      id: notify_webhook
      if: inputs.webhook-url != '' && steps.resolve_release.outputs.released == 'true' && steps.write_artifacts.outputs.succeeded == 'true'
      shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook-url }}
        WEBHOOK_SECRET: ${{ inputs.webhook-secret }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        NOTES_FILE: ${{ steps.synthesize.outputs.notes_file }}
      run: |
        set -euo pipefail

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        set_output "sent" "false"

        release_tag="${RELEASE_TAG}"
        release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"
        notes_file="${NOTES_FILE}"

        if [ ! -s "${notes_file}" ]; then
          echo "::warning::Webhook skipped: notes file is empty or missing."
          exit 0
        fi

        if "${LANDMARK_BIN}" notify-webhook \
          --webhook-url "${WEBHOOK_URL}" \
          --webhook-secret "${WEBHOOK_SECRET}" \
          --version "${release_tag}" \
          --repository "${GITHUB_REPOSITORY}" \
          --release-url "${release_url}" \
          --notes-file "${notes_file}"; then
          set_output "sent" "true"
        else
          echo "::warning::Webhook notification failed; release continues."
        fi

    - name: Send release kit feed event
      id: notify_release_feed
      if: steps.resolve_release.outputs.released == 'true' && steps.write_artifacts.outputs.succeeded == 'true'
      shell: bash
      run: |
        set -euo pipefail

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        set_output "sent" "false"
        set_output "skipped" "false"

        receiver_url="${RELEASE_FEED_URL:-}"
        if [ -z "${receiver_url}" ]; then
          receiver_url="${LANDMARK_RELEASE_FEED_URL:-}"
        fi
        if [ -z "${receiver_url}" ]; then
          receiver_url="${RELEASE_KIT_FEED_URL:-}"
        fi

        receiver_secret="${RELEASE_FEED_SECRET:-}"
        if [ -z "${receiver_secret}" ]; then
          receiver_secret="${LANDMARK_RELEASE_FEED_SECRET:-}"
        fi
        if [ -z "${receiver_secret}" ]; then
          receiver_secret="${RELEASE_KIT_FEED_SECRET:-}"
        fi

        if [ -z "${receiver_url}" ] || [ -z "${receiver_secret}" ]; then
          echo "::notice::Release kit feed event skipped: receiver URL or secret is not configured."
          set_output "skipped" "true"
          exit 0
        fi

        feed_log="${RUNNER_TEMP}/landmark-release-feed.log"
        if "${LANDMARK_BIN}" notify-release-feed \
          --evidence-file "${RUNNER_TEMP}/landmark-artifacts-evidence.json" \
          --release-kit-file "${RUNNER_TEMP}/landmark-run/release-kit.json" \
          --receipt-file "${RUNNER_TEMP}/landmark-release-feed-receipt.json" \
          > "${RUNNER_TEMP}/landmark-release-feed.stdout" \
          2> "${feed_log}"; then
          set_output "sent" "true"
        else
          echo "::warning::Release kit feed event failed; release continues."
        fi

    - name: Send Slack notification
      id: notify_slack
      if: inputs.slack-webhook-url != '' && steps.resolve_release.outputs.released == 'true' && steps.write_artifacts.outputs.succeeded == 'true'
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
        NOTES_FILE: ${{ steps.synthesize.outputs.notes_file }}
      run: |
        set -euo pipefail

        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }

        set_output "sent" "false"

        release_tag="${RELEASE_TAG}"
        release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"
        notes_file="${NOTES_FILE}"

        if [ ! -s "${notes_file}" ]; then
          echo "::warning::Slack notification skipped: notes file is empty or missing."
          exit 0
        fi

        if "${LANDMARK_BIN}" notify-slack \
          --slack-webhook-url "${SLACK_WEBHOOK_URL}" \
          --version "${release_tag}" \
          --repository "${GITHUB_REPOSITORY}" \
          --release-url "${release_url}" \
          --notes-file "${notes_file}"; then
          set_output "sent" "true"
        else
          echo "::warning::Slack notification failed; release continues."
        fi

    - name: Summarize synthesis status
      id: synthesis_result
      shell: bash
      env:
        SYNTHESIS_ENABLED: ${{ inputs.synthesis }}
        RELEASED: ${{ steps.resolve_release.outputs.released }}
        SYNTH_STEP_SUCCEEDED: ${{ steps.synthesis_publish_policy.outputs.succeeded }}
        SYNTH_QUALITY: ${{ steps.synthesis_publish_policy.outputs.quality }}
        UPDATE_STEP_SUCCEEDED: ${{ steps.update_release.outputs.succeeded }}
        SYNTH_FAILURE_STAGE: ${{ steps.synthesis_publish_policy.outputs.failure_stage }}
        SYNTH_FAILURE_MESSAGE: ${{ steps.synthesis_publish_policy.outputs.failure_message }}
        UPDATE_FAILURE_STAGE: ${{ steps.update_release.outputs.failure_stage }}
        UPDATE_FAILURE_MESSAGE: ${{ steps.update_release.outputs.failure_message }}
        ARTIFACT_STEP_SUCCEEDED: ${{ steps.write_artifacts.outputs.succeeded }}
        ARTIFACT_FAILURE_STAGE: ${{ steps.write_artifacts.outputs.failure_stage }}
        ARTIFACT_FAILURE_MESSAGE: ${{ steps.write_artifacts.outputs.failure_message }}
        RSS_ENABLED: ${{ inputs.rss-feed-file != '' || steps.manifest_defaults.outputs.rss_feed_file != '' }}
        RSS_STEP_SUCCEEDED: ${{ steps.update_rss.outputs.succeeded }}
        RSS_FAILURE_STAGE: ${{ steps.update_rss.outputs.failure_stage }}
        RSS_FAILURE_MESSAGE: ${{ steps.update_rss.outputs.failure_message }}
        WEBHOOK_ENABLED: ${{ inputs.webhook-url != '' }}
        WEBHOOK_SENT: ${{ steps.notify_webhook.outputs.sent }}
        SLACK_ENABLED: ${{ inputs.slack-webhook-url != '' }}
        SLACK_SENT: ${{ steps.notify_slack.outputs.sent }}
        MODEL_ATTEMPTS_FILE: ${{ steps.synthesize.outputs.attempts_file }}
        CONTEXT_METADATA_FILE: ${{ steps.synthesize.outputs.context_metadata_file }}
      run: |
        set -euo pipefail
        "${LANDMARK_BIN}" release-policy summary \
          --synthesis-enabled "${SYNTHESIS_ENABLED}" \
          --released "${RELEASED}" \
          --synth-succeeded "${SYNTH_STEP_SUCCEEDED}" \
          --synth-quality "${SYNTH_QUALITY}" \
          --update-succeeded "${UPDATE_STEP_SUCCEEDED}" \
          --synth-failure-stage "${SYNTH_FAILURE_STAGE}" \
          --synth-failure-message "${SYNTH_FAILURE_MESSAGE}" \
          --update-failure-stage "${UPDATE_FAILURE_STAGE}" \
          --update-failure-message "${UPDATE_FAILURE_MESSAGE}" \
          --artifact-succeeded "${ARTIFACT_STEP_SUCCEEDED}" \
          --artifact-failure-stage "${ARTIFACT_FAILURE_STAGE}" \
          --artifact-failure-message "${ARTIFACT_FAILURE_MESSAGE}" \
          --rss-enabled "${RSS_ENABLED}" \
          --rss-succeeded "${RSS_STEP_SUCCEEDED}" \
          --rss-failure-stage "${RSS_FAILURE_STAGE}" \
          --rss-failure-message "${RSS_FAILURE_MESSAGE}" \
          --webhook-enabled "${WEBHOOK_ENABLED}" \
          --webhook-sent "${WEBHOOK_SENT}" \
          --slack-enabled "${SLACK_ENABLED}" \
          --slack-sent "${SLACK_SENT}" \
          --attempts-file "${MODEL_ATTEMPTS_FILE}" \
          --context-metadata-file "${CONTEXT_METADATA_FILE}" \
          --github-output "${GITHUB_OUTPUT}"

    - name: Update floating major tag
      id: update_floating_tag
      if: inputs.floating-tags == 'true' && steps.resolve_release.outputs.released == 'true' && (inputs.synthesis != 'true' || steps.synthesis_result.outputs.succeeded == 'true')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
      run: |
        set -euo pipefail

        release_tag="${RELEASE_TAG}"
        tag_log="${RUNNER_TEMP}/landmark-update-floating-tag.log"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        retry_command() {
          local log_file="$1"
          shift
          local attempt=1
          while [ "${attempt}" -le 3 ]; do
            if timeout 120s "$@" >> "${log_file}" 2>&1; then
              return 0
            fi
            attempt=$((attempt + 1))
            sleep "$((attempt * 2))"
          done
          return 1
        }

        if ! retry_command "${tag_log}" git fetch --tags --force; then
          cat "${tag_log}" >&2
          exit 1
        fi

        major_tag="$("${LANDMARK_BIN}" floating-tag --release-tag "${release_tag}")"
        if [ -z "${major_tag}" ]; then
          echo "::notice::Skipping floating tag update for pre-release tag ${release_tag}."
          exit 0
        fi
        sha="$(git rev-list -n 1 "${release_tag}")"

        echo "Updating floating tag ${major_tag} → ${sha}"
        git tag -f "${major_tag}" "${sha}"
        if ! retry_command "${tag_log}" git push origin "refs/tags/${major_tag}" --force; then
          cat "${tag_log}" >&2
          exit 1
        fi

    - name: Close resolved synthesis failure issues
      id: close_failure_issues
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true' && inputs.synthesis-failure-issue == 'true' && steps.synthesis_result.outputs.succeeded == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
      run: |
        set -euo pipefail
        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }
        if "${LANDMARK_BIN}" close-resolved-failures \
          --github-token "${GITHUB_TOKEN}" \
          --repository "${GITHUB_REPOSITORY}" \
          --release-tag "${RELEASE_TAG}"; then
          set_output "action" "closed"
        else
          echo "::warning::Landmark could not close resolved failure issues."
          set_output "action" "failed"
        fi

    - name: Report synthesis failure
      id: report_synthesis_failure
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true' && inputs.synthesis-failure-issue == 'true' && steps.synthesis_result.outputs.succeeded != 'true' && steps.synthesis_result.outputs.failure_stage != 'configuration'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        FAILURE_STAGE: ${{ steps.synthesis_result.outputs.failure_stage }}
        FAILURE_MESSAGE: ${{ steps.synthesis_result.outputs.failure_message }}
        RELEASE_TAG: ${{ steps.resolve_release.outputs.release_tag }}
      run: |
        set -euo pipefail
        set_output() {
          local key="$1"
          local value="$2"
          printf '%s=%s\n' "${key}" "${value}" >> "${GITHUB_OUTPUT}"
        }
        run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        if "${LANDMARK_BIN}" report-synthesis-failure \
          --github-token "${GITHUB_TOKEN}" \
          --repository "${GITHUB_REPOSITORY}" \
          --release-tag "${RELEASE_TAG}" \
          --workflow-run-url "${run_url}" \
          --workflow-name "${GITHUB_WORKFLOW}" \
          --failure-stage "${FAILURE_STAGE}" \
          --failure-message "${FAILURE_MESSAGE}"; then
          set_output "action" "reported"
        else
          echo "::warning::Landmark could not create a synthesis failure issue."
          set_output "action" "failed"
        fi

    - name: Enforce synthesis required
      if: inputs.synthesis == 'true' && steps.resolve_release.outputs.released == 'true'
      shell: bash
      env:
        SYNTHESIS_REQUIRED: ${{ inputs.synthesis-required }}
        SYNTHESIS_STRICT: ${{ inputs.synthesis-strict }}
        SYNTHESIS_SUCCEEDED: ${{ steps.synthesis_result.outputs.succeeded }}
        FAILURE_STAGE: ${{ steps.synthesis_result.outputs.failure_stage }}
        FAILURE_MESSAGE: ${{ steps.synthesis_result.outputs.failure_message }}
      run: |
        set -euo pipefail
        if [ "${SYNTHESIS_REQUIRED}" != "true" ] && [ "${SYNTHESIS_STRICT}" != "true" ]; then
          exit 0
        fi
        if [ "${SYNTHESIS_SUCCEEDED}" = "true" ]; then
          exit 0
        fi
        echo "::error::Landmark synthesis required but failed at stage '${FAILURE_STAGE}'. ${FAILURE_MESSAGE}"
        exit 1
